name: Pull Request

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-commitlint-${{ runner.os }}-${{ hashFiles('.commitlintrc*', 'commitlint.config.*') }}
          restore-keys: |
            npm-commitlint-${{ runner.os }}-

      - name: Install commitlint
        run: npm install -D @commitlint/cli @commitlint/config-conventional

      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: npx commitlint --last --verbose

      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pip-pre-commit-${{ runner.os }}-

      - name: Cache pre-commit hook environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install Go tools
        run: go install tool

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.2.0

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --show-diff-on-failure --color=always --all-files

  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Disable the Ryuk reaper container. Ryuk manages testcontainers
      # lifecycle cleanup; on GitHub Actions runners it can fail to bind to
      # the Docker socket and cause spurious container-start timeouts.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Unit Tests
        run: go test -count=1 -race ./...

      - name: Integration Tests
        run: go test -count=1 -race -tags=integration ./internal/server/integration_test/...

  coverage-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: pr

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install bc (for float comparison)
        run: sudo apt-get update && sudo apt-get install -y bc

      - name: Run coverage on PR branch
        run: |
          cd pr
          chmod +x ./scripts/coverage.sh

          COV_OUTPUT=$(./scripts/coverage.sh)
          echo "$COV_OUTPUT"

          PR_COVERAGE=$(echo "$COV_OUTPUT" \
            | grep "Final coverage:" \
            | awk '{print $3}' \
            | sed 's/%//')

          echo "PR_COVERAGE=$PR_COVERAGE" >> $GITHUB_ENV

      - name: Checkout base branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.base_ref }}
          path: base

      - name: Run coverage on base branch
        if: github.event_name == 'pull_request'
        run: |
          cd base
          chmod +x ./scripts/coverage.sh

          COV_OUTPUT=$(./scripts/coverage.sh)
          echo "$COV_OUTPUT"

          BASE_COVERAGE=$(echo "$COV_OUTPUT" \
            | grep "Final coverage:" \
            | awk '{print $3}' \
            | sed 's/%//')

          echo "BASE_COVERAGE=$BASE_COVERAGE" >> $GITHUB_ENV

      - name: Compare coverage (PR vs base)
        if: github.event_name == 'pull_request'
        run: |
          echo "PR Coverage   : ${PR_COVERAGE}%"
          echo "Base Coverage : ${BASE_COVERAGE}%"

          if (( $(echo "${PR_COVERAGE} < ${BASE_COVERAGE}" | bc -l) )); then
            echo "Coverage reduced from ${BASE_COVERAGE}% → ${PR_COVERAGE}%"
            exit 1
          fi

          echo "Coverage not reduced"
