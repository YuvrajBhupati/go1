  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Disable the Ryuk reaper container. Ryuk manages testcontainers
      # lifecycle cleanup; on GitHub Actions runners it can fail to bind to
      # the Docker socket and cause spurious container-start timeouts.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Unit Tests
        run: go test -count=1 -race ./...

      - name: Integration Tests
        run: go test -count=1 -race -tags=integration ./internal/server/integration_test/...

  coverage-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Run coverage on PR branch
        run: |
          
          chmod +x ./scripts/coverage.sh

          COV_OUTPUT=$(./scripts/coverage.sh)
          echo "$COV_OUTPUT"

          PR_COVERAGE=$(echo "$COV_OUTPUT" \
            | grep "Final coverage:" \
            | awk '{print $3}' \
            | sed 's/%//')

          
          if [[ -z "$PR_COVERAGE" ]]; then
            echo "❌ ERROR: Could not parse coverage from script output"
            exit 1
          fi

          echo "PR Coverage : ${PR_COVERAGE}%"

          if awk "BEGIN {exit !(${PR_COVERAGE} < 80)}"; then
            echo "❌ Coverage gate failed (minimum 80%)"
            exit 1
          fi

          echo "✅ Coverage gate passed"

 






